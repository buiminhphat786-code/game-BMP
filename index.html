<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #gameCanvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let player = { x: 50, y: 200, size: 40, vy: 0 };

        function draw() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Vẽ nhân vật với hiệu ứng Neon
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffcc';
            ctx.fillStyle = '#00ffcc';
            ctx.fillRect(player.x, player.y, player.size, player.size);
            
            // Vật lý đơn giản
            player.vy += 0.8;
            player.y += player.vy;
            if (player.y > canvas.height - 100) { player.y = canvas.height - 100; player.vy = 0; }
            
            requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', () => { if (player.y >= canvas.height - 100) player.vy = -15; });
        draw();
    </script>
</body>
</html>
