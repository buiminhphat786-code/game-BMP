<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        #bg-forest { position: absolute; bottom: 0; width: 200%; height: 100%; background: linear-gradient(to top, #228B22, #87CEEB); }
        #player { position: absolute; bottom: 50px; left: 50px; width: 80px; height: 100px; background: pink; border-radius: 10px; }
        .controls { position: absolute; bottom: 20px; left: 20px; z-index: 10; }
        button { width: 70px; height: 70px; font-size: 30px; border-radius: 50%; background: rgba(255,255,255,0.5); border: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="bg-forest"></div>
        <div id="player"></div>
        <div class="controls">
            <button ontouchstart="move(-20)" ontouchend="stop()">◀</button>
            <button ontouchstart="move(20)" ontouchend="stop()">▶</button>
        </div>
    </div>
    <script>
        let player = document.getElementById('player');
        let posX = 50;
        let speed = 0;

        function move(s) { speed = s; }
        function stop() { speed = 0; }

        function update() {
            posX += speed;
            player.style.left = posX + 'px';
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
